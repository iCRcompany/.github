name: F-316 Software Risk Analysis
description: Document software risk analysis, hazards, probability, severity, mitigations, and approval
title: "[F-316 Risk Analysis]: "
labels:
  - risk analysis
body:
  - type: input
    id: risk_analysis_study_number
    attributes:
      label: Risk Analysis Study Number
      description: Enter the assigned risk analysis study number if available.
      placeholder: RA-XX or DP-XX-RA
    validations:
      required: false

  - type: input
    id: risk_analysis_date
    attributes:
      label: Date
      description: Enter the date of the risk analysis.
    validations:
      required: true

  - type: input
    id: program_name
    attributes:
      label: Program Name
      description: Enter the software program or product name.
    validations:
      required: true

  - type: input
    id: program_model_number_size
    attributes:
      label: Program Model / Number / Size
      description: Enter the applicable model, product number, scanner type, software version, or system configuration.
    validations:
      required: false

  - type: dropdown
    id: design_stage_status
    attributes:
      label: Design Stage / Status
      description: Select the design stage or current status for this risk analysis.
      options:
        - Initial Design
        - Design Change
        - Bug Fix
        - Feature Enhancement
        - Follow-Up
        - Release Candidate
        - Other
    validations:
      required: true

  - type: textarea
    id: related_prior_studies
    attributes:
      label: Related / Prior Studies
      description: List related prior risk analyses, previous similar designs, related issues, or known historical hazards.
    validations:
      required: false

  - type: input
    id: prepared_by
    attributes:
      label: Prepared By
      description: Enter the name of the person preparing this risk analysis.
    validations:
      required: true

  - type: input
    id: reviewed_approved_by
    attributes:
      label: Reviewed / Approved By
      description: Enter the reviewer or approver name when available.
    validations:
      required: false

  - type: textarea
    id: related_github_records
    attributes:
      label: Related GitHub Records
      description: List related GitHub issues, pull requests, release candidate issues, branches, commits, or tags.
      placeholder: |
        Feature Request / Design Change:
        - #

        Bug Reports / Technical Support Issues:
        - #

        Pull Requests:
        - #

        Release Candidate:
        - #

        Branches / Commits / Tags:
        -
    validations:
      required: true

  - type: textarea
    id: patient_user_population
    attributes:
      label: Patient / User Population
      description: Describe who may use or be affected by the software or device workflow.
    validations:
      required: true

  - type: textarea
    id: intended_uses
    attributes:
      label: Intended Uses
      description: Describe the intended use of the software, feature, workflow, or design change.
    validations:
      required: true

  - type: textarea
    id: foreseeable_unintended_uses_misuses
    attributes:
      label: Foreseeable Unintended Uses and Misuses
      description: Describe foreseeable unintended use, misuse, operator error, workflow misuse, configuration misuse, installation misuse, or support/service misuse.
    validations:
      required: true

  - type: textarea
    id: device_software_aspects_hazards
    attributes:
      label: Device / Software Aspects and Hazards
      description: Document software/device aspects, factors to consider, and hazards.
      placeholder: |
        | Aspect | Factors to Consider | Hazards |
        |---|---|---|
        | User Interface / Workflow |  |  |
        | Image Acquisition |  |  |
        | Image Processing / Reconstruction |  |  |
        | DICOM / PACS / Worklist |  |  |
        | Hardware Motion / Detector / X-ray |  |  |
        | Installer / Upgrade / Configuration |  |  |
        | Licensing / Access Control |  |  |
        | Data Storage / Patient Data |  |  |
        | Other |  |  |
    validations:
      required: true

  - type: textarea
    id: device_software_hazards
    attributes:
      label: Device / Software Hazards
      description: Document hazard categories and specific hazards.
      placeholder: |
        | Category | Hazard |
        |---|---|
        | Safety |  |
        | Image Quality |  |
        | Radiation / Acquisition |  |
        | Hardware Motion |  |
        | Patient / Customer Data |  |
        | DICOM / PACS / Worklist |  |
        | Installation / Upgrade |  |
        | Usability / Workflow |  |
        | Licensing / Security |  |
        | Other |  |
    validations:
      required: true

  - type: dropdown
    id: probability_of_occurrence
    attributes:
      label: Probability of Occurrence of Harm
      description: Select the probability of occurrence of harm.
      options:
        - Unknown (UKN) - probability cannot be estimated; assume same as Frequent
        - Frequent (FRQ) - probability greater than 1:10
        - Probable (PRB) - probability from 1:10 to 1:100
        - Occasional (OCC) - probability from 1:100 to 1:1,000
        - Remote (RMT) - probability from 1:1,000 to 1:10,000
        - Improbable (IMP) - probability less than 1:10,000
    validations:
      required: true

  - type: dropdown
    id: severity_of_harm
    attributes:
      label: Severity of Harm
      description: Select the severity of harm.
      options:
        - Negligible (NGL) - no harm or temporary discomfort
        - Minor (MIN) - minor temporary harm not requiring medical intervention
        - Serious (SRS) - major harm requiring serious medical intervention
        - Critical (CRT) - significant irreversible harm or loss of function
        - Catastrophic (CAT) - life-threatening injury or death
    validations:
      required: true

  - type: dropdown
    id: initial_risk_level
    attributes:
      label: Initial Risk Level
      description: Select the initial risk level.
      options:
        - Low
        - Medium
        - Medium and ALARP
        - High
        - Unknown / Requires Review
    validations:
      required: true

  - type: textarea
    id: risk_analysis_worksheet
    attributes:
      label: Risk Analysis Worksheet
      description: Provide the risk analysis worksheet.
      placeholder: |
        | Hazard | Sequence of Events Leading to Hazardous Situation | Probability of Occurrence of Harm | Harm | Severity of Harm | Initial Risk Level | Risk Control / Mitigation | Verification of Mitigation | Residual Risk | Acceptable? Y/N | Notes |
        |---|---|---|---|---|---|---|---|---|---|---|
        |  |  |  |  |  |  |  |  |  |  |  |
    validations:
      required: true

  - type: textarea
    id: risk_control_mitigation_summary
    attributes:
      label: Risk Control / Mitigation Summary
      description: Describe the risk controls, software changes, warnings, workflow controls, test controls, design controls, training, labeling, or other mitigation.
    validations:
      required: true

  - type: textarea
    id: verification_of_risk_controls
    attributes:
      label: Verification of Risk Controls
      description: Explain how risk controls were or will be verified, including related test issues, pull requests, release candidate issues, validation records, or other linked evidence.
    validations:
      required: true

  - type: textarea
    id: residual_risk_evaluation
    attributes:
      label: Residual Risk Evaluation
      description: Explain whether residual risk remains after mitigation and whether the residual risk is acceptable.
    validations:
      required: true

  - type: textarea
    id: risk_benefit_management_review
    attributes:
      label: Risk Benefit / Management Review
      description: Provide management review, risk-benefit rationale, or approval notes when residual risk remains or risk is Medium/High.
    validations:
      required: false

  - type: dropdown
    id: risk_review_outcome
    attributes:
      label: Risk Review Outcome
      description: Select the outcome of this risk review.
      options:
        - Acceptable - no additional action required
        - Acceptable with mitigation
        - Additional mitigation required
        - Escalate to management review
        - Not acceptable
        - Deferred / requires follow-up
    validations:
      required: true

  - type: textarea
    id: action_items
    attributes:
      label: Action Items
      description: List action items, responsible person, due date, and status.
      placeholder: |
        | Action Item | Responsible Person | Due Date | Status |
        |---|---|---|---|
        |  |  |  |  |
    validations:
      required: false

  - type: textarea
    id: final_approval_notes
    attributes:
      label: Final Approval Notes
      description: Provide any final reviewer or approver notes.
    validations:
      required: false
