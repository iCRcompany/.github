name: Release Candidate
description: Track a release candidate build, installer location, testing, risk review, and release approval
title: "[Release Candidate]: "
labels:
  - Release Candidate
body:
  - type: input
    id: release_version
    attributes:
      label: Release Version
      description: Enter the release candidate version number.
      placeholder: e.g. 2.2.1.14
    validations:
      required: true

  - type: textarea
    id: changelog
    attributes:
      label: Changelog
      description: List the changes included in this release candidate.
      placeholder: |
        Added:
        - 

        Changed:
        - 

        Fixed:
        - 

        Removed:
        - 
    validations:
      required: true

  - type: textarea
    id: installer_location
    attributes:
      label: Installer Location
      description: Provide the installer path, shared folder, GitHub release link, or build artifact location.
      placeholder: |
        Installer:
        Readme:
        Build artifacts:
        Notes:
    validations:
      required: true

  - type: textarea
    id: source_branch_commit
    attributes:
      label: Source Branch / Commit
      description: Provide the exact source branch, commit hash, tag, or build reference used to create the release candidate.
      placeholder: |
        Branch:
        Commit:
        Tag:
        Build/Run:
    validations:
      required: true

  - type: textarea
    id: related_issues_pull_requests
    attributes:
      label: Related Issues / Pull Requests
      description: List related GitHub issues, feature requests/design changes, bug reports, support issues, and pull requests.
      placeholder: |
        Issues:
        - #

        Pull Requests:
        - #

        Notes:
    validations:
      required: true

  - type: checkboxes
    id: testing_checklist
    attributes:
      label: Testing Checklist
      description: Confirm release-readiness testing items are complete.
      options:
        - label: "Run through testing workflow: https://docs.google.com/forms/d/1ynKPiYMX_eelifCTsvRVGKH_Ej84-sJLEO0D_jlTBOg/edit"
          required: true
        - label: Confirm installer builds successfully
        - label: Confirm installer is code signed
        - label: Confirm version number is correct in the application
        - label: Confirm version number is correct in the installer
        - label: Confirm install was tested
        - label: Confirm upgrade was tested, if applicable
        - label: Confirm uninstall was tested, if applicable
        - label: Confirm basic application launch was tested
        - label: Confirm release candidate testing workflow was completed
        - label: Confirm no blocking issues remain

  - type: checkboxes
    id: risk_review_complete
    attributes:
      label: Risk Review Complete
      description: Confirm that risk was reviewed before release.
      options:
        - label: Risk review completed for included changes
          required: true
        - label: Any new or changed risks are documented in related issues
        - label: Risk mitigations were tested or reviewed where applicable
        - label: No unresolved high-risk items remain without approval

  - type: textarea
    id: known_issues
    attributes:
      label: Known Issues
      description: Describe known issues, limitations, workarounds, skipped tests, or items intentionally deferred.
      placeholder: |
        Known issues:
        - 

        Workarounds:
        - 

        Deferred items:
        - 
    validations:
      required: false

  - type: dropdown
    id: approval_release_decision
    attributes:
      label: Approval / Release Decision
      description: Select the current release decision state.
      options:
        - Ready for testing
        - Testing in progress
        - Approved for release
        - Blocked
        - Rejected
    validations:
      required: true
