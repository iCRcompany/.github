name: Bug Report
description: Report a software issue or unexpected behavior
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: issue_summary
    attributes:
      label: Issue Summary
      description: Briefly summarize the issue.
    validations:
      required: true

  - type: input
    id: software_version
    attributes:
      label: Software Version
      description: What version of the software are you using?
      placeholder: e.g. XC2 2.2.1.14
    validations:
      required: true

  - type: textarea
    id: observed_machine
    attributes:
      label: Observed Machine
      description: Provide details about the machine, scanner, detector, operating system, or hardware where the issue was observed.
      placeholder: |
        Customer/Site:
        Computer Name:
        Windows Version:
        Scanner/Gantry:
        Detector:
        Recotom Version:
        Vivix / DR SDK Version:
    validations:
      required: false

  - type: input
    id: area
    attributes:
      label: Area
      description: Which area or component is affected?
      placeholder: e.g. Acquisition, Reconstruction, DICOM, Worklist, Installer, Licensing, Hardware / Driver, Calibration, Image Processing, Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / Actual Behavior
      description: Describe the issue or unexpected behavior.
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      description: Provide step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste any relevant logs, error messages, stack traces, or service messages.
      render: text
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Attach screenshots, images, or screen recordings that help illustrate the issue.
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Add any other context such as related issues, branches, commits, timing, customer notes, workaround details, or anything else that may be useful.
    validations:
      required: false
