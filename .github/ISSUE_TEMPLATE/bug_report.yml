name: Bug Report
description: Report a software issue or unexpected behavior
title: "[Bug]: "
labels:
  - bug
body:
  - type: input
    id: software_version
    attributes:
      label: Software Version
      description: What version of the software are you using?
      placeholder: e.g. 1.2.3
    validations:
      required: true

  - type: input
    id: area
    attributes:
      label: Area
      description: Which area or component is affected?
      placeholder: e.g. Authentication, API, UI
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the issue or unexpected behavior.
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      description: Provide step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected_result
    attributes:
      label: Expected Result
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs_screenshots
    attributes:
      label: Logs/Screenshots
      description: Attach any relevant logs or screenshots to help diagnose the problem.
    validations:
      required: false
