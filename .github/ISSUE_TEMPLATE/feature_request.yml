name: Feature Request
description: Request a new feature or enhancement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: feature_description_benefit
    attributes:
      label: Feature Description / Benefit
      description: Describe the feature to be implemented and how it will benefit the software, workflow, customer, or user.
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Reason / Problem Solved
      description: Why is this feature needed? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: suggested_implementation
    attributes:
      label: Suggested Implementation
      description: Suggest how to implement this change, if applicable.
    validations:
      required: false

  - type: textarea
    id: additional_context_references
    attributes:
      label: Additional Context / References
      description: Provide any additional context, mockups, screenshots, related issues, branches, commits, customer notes, or references.
    validations:
      required: false
