name: Feature Request
description: Request a new feature or enhancement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: request
    attributes:
      label: Request
      description: Describe the feature or enhancement you would like to see.
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Reason
      description: Why is this feature needed? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: additional_details
    attributes:
      label: Additional Details
      description: Any additional context, mockups, or references that may help.
    validations:
      required: false
