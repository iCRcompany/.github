name: Technical Support Issue
description: Track a customer, machine, installation, or field support issue
title: "[Support]: "
labels:
  - support
body:
  - type: textarea
    id: issue_summary
    attributes:
      label: Issue Summary
      description: Briefly summarize the technical support issue.
    validations:
      required: true

  - type: input
    id: software_version
    attributes:
      label: Software Version
      description: What version of the software is installed?
      placeholder: e.g. XC2 2.2.1.14
    validations:
      required: true

  - type: textarea
    id: observed_machine
    attributes:
      label: Observed Machine
      description: Provide details about the machine, scanner, detector, operating system, or hardware where the issue was observed.
      placeholder: |
        Customer/Site:
        Computer Name:
        Windows Version:
        Scanner/Gantry:
        Detector:
        Recotom Version:
        Vivix / DR SDK Version:
        Network / PACS / Worklist details:
    validations:
      required: true

  - type: input
    id: area
    attributes:
      label: Area
      description: Which support area is affected?
      placeholder: e.g. Installation, Acquisition, Reconstruction, DICOM, Worklist, PACS Send, Licensing, Hardware / Driver, Calibration, Image Quality, Network, Other
    validations:
      required: false

  - type: textarea
    id: efforts_made
    attributes:
      label: Efforts Made So Far
      description: What troubleshooting steps have already been tried and what were the results?
    validations:
      required: true

  - type: dropdown
    id: current_status
    attributes:
      label: Current Status
      description: What is the current status of this issue?
      options:
        - Unresolved
        - Intermittent
        - Resolved with workaround
        - Waiting on customer
        - Waiting on engineering
        - Needs follow-up
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Attach screenshots, photos, error dialogs, images, or screen recordings that help illustrate the issue.
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Messages
      description: Paste any relevant logs, service messages, crash details, Windows Event Viewer entries, or exact error text.
      render: text
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Add any other context such as customer notes, timing, recent changes, related issues, workaround details, remote-access notes, or anything else useful.
    validations:
      required: false
